name: Deploy Multiple Shiny Apps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      
      - name: Install packages
        run: |
          install.packages(c("shiny", "shinylive", "shinythemes", "plotly", "ggplot2", "MASS", "bslib", "dplyr", "shinydashboard", "shinyWidgets", "quantmod", "tidyverse", "xts", "zoo", "vars", "urca", "tseries", "forecast", "lmtest", "corrplot", "PerformanceAnalytics", "TTR", "DT", "scales", "e1071"))
        shell: Rscript {0}
        
      - name: Build All Shinylive Apps & Deploy Premium Menu
        run: |
          library(shinylive)
          
          # 1. Crear el directorio final de la web
          dir.create("_site", showWarnings = FALSE)
          
          # 2. Buscar todas las carpetas de proyectos (ignorando carpetas del sistema)
          carpetas <- list.dirs(full.names = FALSE, recursive = FALSE)
          carpetas <- carpetas[!carpetas %in% c(".git", ".github", "_site")]
          
          # 3. Compilar cada app dentro de su propia subcarpeta
          for (carpeta in carpetas) {
            if (file.exists(file.path(carpeta, "app.R"))) {
              message("Compilando aplicacion: ", carpeta)
              shinylive::export(appdir = carpeta, destdir = file.path("_site", carpeta))
            }
          }
          
          # 4. Copiar los archivos estáticos de diseño premium al directorio final _site
          file.copy("index.html", "_site/index.html", overwrite = TRUE)
          file.copy("style.css", "_site/style.css", overwrite = TRUE)
        shell: Rscript {0}
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
